apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver-service
  template:
    metadata:
      labels:
        app: driver-service
    spec:
      # CHANGE 1: allow Kubernetes to pull private images from GHCR
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: driver-service
          # CHANGE 2: Changed image path
          image: ghcr.io/high-la/ride-hailing/driver-service:1.0
          env:
            # Jaeger endpoint
            - name: JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JAEGER_ENDPOINT
            # RabbitMQ credentials
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: uri
          ports:
            - containerPort: 9092
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: driver-service
spec:
  selector:
    app: driver-service
  ports:
    - port: 9092
      name: grpc
      targetPort: 9092
  type: ClusterIP
