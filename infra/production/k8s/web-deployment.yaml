apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: web
          image: ghcr.io/high-la/ride-hailing/web:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: NODE_ENV
              value: "production"
            # - name: NEXT_PUBLIC_API_URL
            #   valueFrom:
            #     configMapKeyRef:
            #       name: app-config
            #       key: NEXT_PUBLIC_API_URL
            # - name: NEXT_PUBLIC_WEBSOCKET_URL
            #   valueFrom:
            #     configMapKeyRef:
            #       name: app-config
            #       key: NEXT_PUBLIC_WEBSOCKET_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30001
  type: NodePort